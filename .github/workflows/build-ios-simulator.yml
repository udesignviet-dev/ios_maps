name: Build iOS Simulator App

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build simulator .app
        run: |
          xcodebuild \
            -project MuleHazardMap.xcodeproj \
            -scheme MuleHazardMap \
            -configuration Debug \
            -sdk iphonesimulator \
            -derivedDataPath ./build \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Package for Appetize
        run: |
          cd build/Build/Products/Debug-iphonesimulator
          ditto -c -k --sequesterRsrc --keepParent MuleHazardMap.app ../../../../MuleHazardMap-appetize.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MuleHazardMap-appetize
          path: MuleHazardMap-appetize.zip
          if-no-files-found: error
